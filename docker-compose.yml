services:
  postgres:
    image: postgres:18
    container_name: jobis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-jobis}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - jobis_postgres_data:/var/lib/postgresql/data

volumes:
  jobis_postgres_data:

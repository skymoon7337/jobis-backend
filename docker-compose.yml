services:
  postgres:
    image: postgres:18
    container_name: jobis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
정      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - jobis_postgres_data:/var/lib/postgresql/data

volumes:
  jobis_postgres_data:
